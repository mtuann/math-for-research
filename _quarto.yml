format:
  html:
    theme:
      light: [journal, styles.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    html-math-method: mathjax
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
